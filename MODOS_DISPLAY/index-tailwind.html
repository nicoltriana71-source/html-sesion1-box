<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <h1>INLINE:</h1>
    <div class="inline bg-pink-500  text-white">
        Productos
    </div>
    <div class="inline bg-green-500 text-white">
        Servicios
    </div>
    <div class="inline bg-gray-300 text-black">
        Contacto
    </div>
    <div class="inline bg-blue-200 text-black">
        Nosotros
    </div>
    <hr />
    <h1>BLOCK:</h1>
    <div class="block bg-yellow-200 text-black-700 w-[200px] h-[100px]">
        Productos
    </div>
    <div class="block bg-blue-200 text-purple-700 w-[200px] h-[100px]">
        Servicios
    </div>
    <div class="block bg-green-200 text-red-500 w-[200px] h-[100px]">
        Contacto
    </div>
    <div class="block bg-orange-200 text-white w-[200px] h-[100px]">
        Nosotros
    </div>
</body>
</html>
