<!DOCTYPE html>

<head>
    <style>
        .elemento{
            display: inline;
            background-color: black;
            color: white;
            width: 200px;
            height: 200px;
        }

        .elemento_block{
            display: block;
            background-color: #023;
            color: white;
            width: 200px;
            height: 200px;
        }

        .resaltado{
            color: aqua;
            letter-spacing: 2px;
            font-family: Arial;
            font-size: large;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>INLINE:</h1>
    <div class="elemento">
        Productos
    </div>
    <div class="elemento">
        Servicios
    </div>
    <div class="elemento resaltado">
        Contacto
    </div>
    <div class="elemento resaltado">
        Nosotros
    </div>
    <hr />
    <h1>BLOCK:</h1>
    <div class="elemento_block">
        Productos
    </div>
    <div class="elemento_block">
        Servicios
    </div>
    <div class="elemento_block">
        Contacto
    </div>
    <div class="elemento_block">
        Nosotros
    </div>
</body>
</html>
